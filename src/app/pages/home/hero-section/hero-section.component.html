<section class="hero">
  <!-- Interactive 3D Canvas -->
  <canvas #threeCanvas class="hero__canvas"></canvas>
  
  <div class="container hero__container">
    <div class="hero__content">
      <h1 class="hero__title">
        <span class="word">TAC</span><br />
        <span class="word">LASER</span><br />
        <span class="word text-gradient">CUTTING</span>
      </h1>
      
      <p class="hero__subtitle">
        Elevating industrial manufacturing with state-of-the-art CNC laser technology. We turn raw materials into precise masterpieces.
      </p>
      
      <div class="hero__cta">
        <a routerLink="/quote" class="btn-primary">
          <span>Get a Free Quote</span>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </a>
        <a routerLink="/portfolio" class="btn-outline">View Our Work</a>
      </div>
    </div>
  </div>
  
  <div class="hero__scroll-indicator">
    <div class="mouse">
      <div class="wheel"></div>
    </div>
    <span class="text">Scroll to explore</span>
  </div>
</section>
